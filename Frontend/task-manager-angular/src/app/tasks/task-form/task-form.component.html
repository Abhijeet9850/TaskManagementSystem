<div style="position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center;">
  <div class="card" style="width:480px; max-height:90vh; overflow-y:auto;">
    <h3>{{ isEditMode ? 'Edit Task' : 'New Task' }}</h3>
    <form [formGroup]="form" (ngSubmit)="save()">
      <label>Title</label>
      <input type="text" formControlName="title">
      <div class="error" *ngIf="f['title'].invalid && f['title'].touched">Title is required.</div>

      <label>Description</label>
      <textarea rows="3" formControlName="description"></textarea>

      <label>Priority</label>
      <select formControlName="priority">
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>

      <label *ngIf="isEditMode">Status</label>
      <select *ngIf="isEditMode" formControlName="status">
        <option value="Pending">Pending</option>
        <option value="InProgress">In Progress</option>
        <option value="Completed">Completed</option>
      </select>

      <label>Start Date</label>
      <input type="date" formControlName="startDate">
      <div class="error" *ngIf="f['startDate'].invalid && f['startDate'].touched">Start Date is required.</div>

      <label>Due Date</label>
      <input type="date" formControlName="dueDate">
      <div class="error" *ngIf="f['dueDate'].invalid && f['dueDate'].touched">Due Date is required.</div>
      <div class="error" *ngIf="f['dueDate'].touched && form.errors?.['dueBeforeStart']">
        Due Date must not be earlier than Start Date.
      </div>

      <label>Assigned Employee</label>
      <select formControlName="assignedEmployeeId">
        <option [ngValue]="null" disabled>Select an employee</option>
        <option *ngFor="let e of employees" [ngValue]="e.id">{{ e.name }} ({{ e.department }})</option>
      </select>
      <div class="error" *ngIf="f['assignedEmployeeId'].invalid && f['assignedEmployeeId'].touched">
        Please select an employee.
      </div>

      <ng-container *ngIf="!isEditMode">
        <label>Attachment (optional, PDF/JPG/PNG, max 5 MB)</label>
        <input type="file" accept=".pdf,.jpg,.jpeg,.png" (change)="onFileSelected($event)">
        <div class="error" *ngIf="fileSizeError">{{ fileSizeError }}</div>
        <div *ngIf="selectedFile" style="font-size:13px; color:#6b7280; margin-top:4px;">
          Selected: {{ selectedFile.name }}
        </div>
      </ng-container>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <div style="display:flex; gap:10px; margin-top:18px;">
        <button type="submit" class="btn btn-primary">Save</button>
        <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
